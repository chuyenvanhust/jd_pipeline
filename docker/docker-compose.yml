version: '3'

services:

  # ─────────────────────────────────────────
  # ZOOKEEPER
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────
  # SPARK MASTER
  # ─────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
      HADOOP_CONF_DIR: /opt/hadoop/conf
      # Tăng timeout để không kill app khi worker bận gọi Ollama lâu
      SPARK_MASTER_OPTS: >-
        -Dspark.worker.timeout=600
        -Dspark.deploy.defaultCores=4
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./storage/data_lake:/opt/spark/data_lake
      - ./docker/hadoop/conf:/opt/hadoop/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # SPARK WORKER 1
  # ─────────────────────────────────────────
  spark-worker-1:
    image: apache/spark:3.5.3
    container_name: spark-worker-1
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_CORES: "2"   # 2 cores → 2 task Ollama song song
      SPARK_WORKER_OPTS: >-
        -Dspark.executor.heartbeatInterval=60s
        -Dspark.network.timeout=800s
    volumes:
      - ./storage/data_lake:/opt/spark/data_lake

  # ─────────────────────────────────────────
  # SPARK WORKER 2
  # ─────────────────────────────────────────
  spark-worker-2:
    image: apache/spark:3.5.3
    container_name: spark-worker-2
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: "2g"
      SPARK_WORKER_CORES: "2"   # tổng: 4 cores → 4 Ollama call song song
      SPARK_WORKER_OPTS: >-
        -Dspark.executor.heartbeatInterval=60s
        -Dspark.network.timeout=800s
    volumes:
      - ./storage/data_lake:/opt/spark/data_lake

  # ─────────────────────────────────────────
  # POSTGRESQL – Hive Metastore backend
  # ─────────────────────────────────────────
  postgres:
    image: postgres:12-alpine
    container_name: hive-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # HADOOP NAMENODE
  # ─────────────────────────────────────────
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop2.7.4-java8
    container_name: namenode
    restart: unless-stopped
    ports:
      - "50070:50070"
      - "9000:9000"
    environment:
      CLUSTER_NAME: test
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:50070"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # HADOOP DATANODE
  # ─────────────────────────────────────────
  datanode:
    ports:
      - "50075:50075"
    image: bde2020/hadoop-datanode:2.0.0-hadoop2.7.4-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    depends_on:
      namenode:
        condition: service_healthy
    environment:
      SERVICE_PRECONDITION: "namenode:50070"
      CORE_CONF_fs_defaultFS: hdfs://namenode:9000
      HDFS_CONF_dfs_replication: 1
      HDFS_CONF_dfs_datanode_hostname: datanode
      HDFS_CONF_dfs_datanode_http__address: 0.0.0.0:50075
    volumes:
      - hadoop_datanode:/hadoop/dfs/data

  # ─────────────────────────────────────────
  # HIVE SERVER
  # ─────────────────────────────────────────
  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    restart: unless-stopped
    depends_on:
      namenode:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "10000:10000"
      - "10002:10002"
    environment:
      HIVE_SITE_CONF_javax_jdo_option_ConnectionURL: "jdbc:postgresql://postgres:5432/metastore"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionDriverName: "org.postgresql.Driver"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionUserName: "hive"
      HIVE_SITE_CONF_javax_jdo_option_ConnectionPassword: "hive"
      HIVE_SITE_CONF_datanucleus_autoCreateSchema: "false"
      HIVE_SITE_CONF_datanucleus_fixedDatastore: "false"
      HIVE_SITE_CONF_datanucleus_autoCreateTables: "true"
      CORE_CONF_fs_defaultFS: "hdfs://namenode:9000"
      SERVICE_PRECONDITION: "namenode:50070 postgres:5432"

  # ─────────────────────────────────────────
  # KAFKA UI
  # ─────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  # ─────────────────────────────────────────
  # OLLAMA — Local LLM (GPU)
  # ─────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

# ─────────────────────────────────────────
# VOLUMES
# ─────────────────────────────────────────
volumes:
  hadoop_namenode:
  hadoop_datanode:
  postgres_data:
  ollama_data: